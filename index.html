<!DOCTYPE html>
<html lang="th">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScienceLab Booking</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ScienceLab Booking">
  <meta name="mobile-web-app-capable" content="yes">
  
  <!-- ตั้งค่าไอคอนสำหรับ PWA (Android / Chrome) และ iOS Safari -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=block" rel="stylesheet">
  
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.330.0"
      }
    }
  </script>
  
  <style>
    /* Inline CSS for immediate loading screen rendering */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #0f172a;
      font-family: 'Poppins', 'Noto Sans Thai', sans-serif;
      overflow: hidden;
    }
    .shell-loader-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #026670 0%, #032b30 100%);
      overflow: hidden;
    }
    .shell-loader-content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      color: #ffffff;
      max-width: 440px;
      width: 90%;
      height: 380px;
      text-align: left;
      padding: 20px;
      box-sizing: border-box;
    }
    .shell-loader-logo {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
      position: relative;
      z-index: 30;
      align-self: flex-start;
    }
    .shell-loader-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin: 0 0 12px 0;
      line-height: 1.3;
      color: #ffffff;
      text-align: left;
      height: 80px;
      display: flex;
      align-items: center;
    }
    .shell-loader-subtitle {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.75);
      margin: 0 0 32px 0;
      line-height: 1.5;
      text-align: left;
      font-weight: normal;
      min-height: 54px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      width: 100%;
    }
    .shell-loader-line {
      display: block;
      white-space: nowrap;
    }
    @media (max-width: 480px) {
      .shell-loader-subtitle {
        font-size: clamp(0.6rem, 3.2vw, 0.85rem);
      }
    }
    .shell-loader-progress-container {
      width: 100%;
      margin-top: 10px;
    }
    .shell-loader-progress-bar-bg {
      width: 100%;
      height: 6px;
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 12px;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
    }
    .shell-loader-progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #ba9c5a, #dec29d);
      border-radius: 999px;
      transition: width 0.3s ease-out;
      box-shadow: 0 0 8px rgba(186, 156, 90, 0.6);
    }
    .shell-loader-status-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      width: 100%;
    }
    .shell-loader-status-text {
      color: rgba(255, 255, 255, 0.5);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-right: 8px;
    }
    .shell-loader-percent {
      color: #dec29d;
      font-weight: 700;
      font-size: 0.85rem;
      flex-shrink: 0;
    }
  </style>

  <script>
    (function() {
      var progress = 0;
      var progressEl = null;
      var progressBarEl = null;
      var loaderOverlayEl = null;
      var statusTextEl = null;
      
      function updateProgress(target, duration, statusText, callback) {
        var start = progress;
        var startTime = performance.now();
        if (statusTextEl && statusText) {
          statusTextEl.innerText = statusText;
        }
        
        function animate(time) {
          var elapsed = time - startTime;
          var t = Math.min(elapsed / duration, 1);
          var ease = t * (2 - t);
          progress = Math.round(start + (target - start) * ease);
          
          if (progressEl) progressEl.innerText = progress + '%';
          if (progressBarEl) progressBarEl.style.width = progress + '%';
          
          if (t < 1) {
            requestAnimationFrame(animate);
          } else if (callback) {
            callback();
          }
        }
        requestAnimationFrame(animate);
      }
      
      window.addEventListener('DOMContentLoaded', function() {
        progressEl = document.getElementById('shell-loader-percent');
        progressBarEl = document.getElementById('shell-loader-bar');
        loaderOverlayEl = document.getElementById('shell-loader-overlay');
        statusTextEl = document.getElementById('shell-loader-status-text');
        
        // Phase 1: DOM Parsed
        updateProgress(20, 400, "กำลังโหลดฟอนต์และสไตล์ชีท...", function() {
          // Phase 2: Load Tailwind CSS
          var tailwindScript = document.createElement('script');
          tailwindScript.src = "https://cdn.tailwindcss.com";
          tailwindScript.onload = function() {
            // Configure Tailwind
            if (window.tailwind) {
              tailwind.config = {
                theme: {
                  extend: {
                    colors: {
                      gold: {
                        50: '#fbf9f5',
                        100: '#f5f0e3',
                        200: '#eadbc3',
                        300: '#dec29d',
                        400: '#ba9c5a',
                        500: '#a88846',
                        600: '#9d7634',
                        700: '#835c2d',
                        800: '#6d4c2a',
                        900: '#5a3f25',
                      }
                    },
                    fontFamily: {
                      sans: ['Poppins', 'Noto Sans Thai', 'sans-serif'],
                    }
                  }
                }
              };
            }
            
            updateProgress(50, 600, "กำลังโหลดไลบรารี Babel Compiler...", function() {
              // Phase 3: Load Babel Standalone
              var babelScript = document.createElement('script');
              babelScript.src = "https://unpkg.com/@babel/standalone/babel.min.js";
              babelScript.onload = function() {
                updateProgress(80, 800, "กำลังคอมไพล์โค้ด React Application...", function() {
                  // Phase 4: Run Babel compilation
                  if (window.Babel) {
                    try {
                      window.Babel.transformScriptTags();
                    } catch (err) {
                      console.error("Compilation error:", err);
                      window.onReactReady();
                    }
                  } else {
                    window.onReactReady();
                  }
                });
              };
              babelScript.onerror = function() {
                window.onReactReady();
              };
              document.head.appendChild(babelScript);
            });
          };
          tailwindScript.onerror = function() {
            window.onReactReady();
          };
          document.head.appendChild(tailwindScript);
        });
      });
      
      // Callback for React App to declare it is ready and mounted
      window.onReactReady = function() {
        updateProgress(100, 300, "เริ่มต้นแอปพลิเคชัน...", function() {
          if (loaderOverlayEl) {
            loaderOverlayEl.style.display = 'none';
          }
        });
      };
    })();
  </script>

  <!-- โหลดสไตล์ชีทแยก -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <!-- App Shell loading overlay screen -->
  <div id="shell-loader-overlay" class="shell-loader-overlay">
    <div class="shell-loader-content">
      <img src="https://lh3.googleusercontent.com/d/15J4cmPR70AqZfOZpPErQ9avHQCv1WzIo" class="shell-loader-logo" alt="School Logo" />
      <h2 class="shell-loader-title">ระบบจองห้องปฏิบัติการ<br/>วิทยาศาสตร์</h2>
      <p class="shell-loader-subtitle">
        <span class="shell-loader-line">จองคิวการใช้งานห้องปฏิบัติการอย่างเป็นระบบ รวดเร็ว</span>
        <span class="shell-loader-line">และโปร่งใส เพื่อยกระดับการทํางานส่วนรวม</span>
      </p>
      
      <div class="shell-loader-progress-container">
        <div class="shell-loader-progress-bar-bg">
          <div id="shell-loader-bar" class="shell-loader-progress-bar"></div>
        </div>
        <div class="shell-loader-status-container">
          <span id="shell-loader-status-text" class="shell-loader-status-text">กำลังโหลดทรัพยากรระบบ...</span>
          <span id="shell-loader-percent" class="shell-loader-percent">0%</span>
        </div>
      </div>
    </div>
  </div>

  <!-- React mounting root -->
  <div id="root"></div>

  <!-- โหลด React/JSX Application -->
  <script type="text/babel" data-type="module" src="app.js"></script>
</body>
</html>
